spring.application.name=obra-do-berco-voluntarios

server.port=8083

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/obra_do_berco_voluntarios}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

admin.seed.email=${ADMIN_EMAIL:}
admin.seed.senha=${ADMIN_SENHA:}
admin.seed.nome=${ADMIN_NOME:Administrador}
admin.seed.telefone=${ADMIN_TELEFONE:(00) 00000-0000}