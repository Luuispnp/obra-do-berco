spring.application.name=obra-do-berco-voluntarios

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/obra_do_berco_voluntarios
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

admin.seed.email=${ADMIN_EMAIL:}
admin.seed.senha=${ADMIN_SENHA:}
admin.seed.nome=${ADMIN_NOME:Administrador}
admin.seed.telefone=${ADMIN_TELEFONE:(00) 00000-0000}