name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - obra-do-berco-eureka-server
          - obra-do-berco-api-gateway
          - obra-do-berco-auth
          - obra-do-berco-gestante
          - obra-do-berco-voluntarios
          - obra-do-berco-solicitacoes
          - obra-do-berco-eventos
          - obra-do-berco-document
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      JWT_SECRET: ci-test-secret-do-not-use-outside-ci-0123456789
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Create service database
        run: |
          db_name=$(echo "${{ matrix.service }}" | tr '-' '_')
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE ${db_name};"

      - name: Build and test
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x ./mvnw
          db_name=$(echo "${{ matrix.service }}" | tr '-' '_')
          export DB_URL="jdbc:postgresql://localhost:5432/${db_name}"
          ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obra-do-berco-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: obra-do-berco-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
