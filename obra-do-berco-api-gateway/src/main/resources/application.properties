spring.application.name=obra-do-berco-api-gateway

server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=solicitacoes
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://OBRA-DO-BERCO-SOLICITACOES
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/solicitacoes/**

spring.cloud.gateway.server.webmvc.routes[1].id=gestantes
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://OBRA-DO-BERCO-GESTANTE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/gestantes/**

spring.cloud.gateway.server.webmvc.routes[2].id=document
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://OBRA-DO-BERCO-DOCUMENT
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/documentos/**

spring.cloud.gateway.server.webmvc.routes[3].id=voluntarios
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://OBRA-DO-BERCO-VOLUNTARIOS
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/voluntarios/**
